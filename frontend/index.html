<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FrogCord - Modern iletişim platformu" />
    <meta name="theme-color" content="#0b0d0b" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>FrogCord</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.createElement('div');
        el.id = 'global-error-banner';
        el.style.position = 'fixed';
        el.style.top = '0';
        el.style.left = '0';
        el.style.right = '0';
        el.style.zIndex = '99999';
        el.style.background = '#ff4444';
        el.style.color = 'white';
        el.style.padding = '15px 40px 15px 20px';
        el.style.fontSize = '12px';
        el.style.boxShadow = '0 4px 12px rgba(0,0,0,0.5)';
        el.style.fontFamily = 'monospace';
        el.innerHTML = '<strong>GLOBAL HATA:</strong> ' + e.message + ' <br><small>' + e.filename + ':' + e.lineno + '</small>';
        
        var close = document.createElement('button');
        close.innerText = '×';
        close.style.position = 'absolute';
        close.style.right = '10px';
        close.style.top = '5px';
        close.style.background = 'transparent';
        close.style.border = 'none';
        close.style.color = 'white';
        close.style.fontSize = '24px';
        close.style.cursor = 'pointer';
        close.onclick = function() { el.remove(); };
        el.appendChild(close);
        
        document.body.appendChild(el);
      });
    </script>
  </body>
</html>
